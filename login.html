<!DOCTYPE html>

<html lang="pt-br">

</html>

<head>
  <meta charset="UTF-8">
  <title>LOGIN</title>

  <link rel="stylesheet" href="style.css">
  <!-- conecta com o CSS -->
</head>

<body>

  <header class="bem-vindo">


    <div class="logo">
      <a href="index.html">
        <img src="imagens/Logo.png" alt="Logo CATIF">

      </a>
    </div>

    <h2>Acesse o CATIF!</h2>


  </header>



  <div class="login-container">


    <div class="login">

      <img class="logoColorida" src="imagens/imgLogoColorida.png" alt="Logo Colorida Catif">

      <!-- <h2 class="titEntrar">Entrar</h2>  Estava assim --->
      <h2 class="titEntrar">LOGIN</h2> <!-- Ao invés de 'Entrar' no início do login, eu coloquei 'LOGIN' apenas " -->

      <form>

        <div class="entrada">
          <input type="email" placeholder="Email" required>
          <!-- campo de email -->

          <input type="password" placeholder="Senha" required>
          <!-- campo de senha -->

        </div>


        <a href="#">
          <p class="esqueceuSenha">Esqueceu a senha?</p>
        </a>


        <button class="btEntrar" type="submit">Entrar</button>
        <!-- botão -->

        <div class="outrasFormas">
          <p>outras formas</p>

          <a class="linkFacebook" href="https://www.facebook.com/?locale=pt_BR">
            <img class="facebookLogo" src="imagens/facebookLogo.png" alt="facebookLogo">
          </a>

          <a class="linkGoogle" href="https://www.google.com/">
            <img class="googleLogo" src="imagens/googleLogo.png" alt="googleLogo">
          </a>

        </div>



      </form>


    </div>





  </div>

</body>

</html>
